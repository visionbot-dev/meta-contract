<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>Meta-Contract Metalet Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="../../dist/metaContract.browser.min.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .log-area { height: 200px; overflow-y: auto; font-size: 13px; }
    .log-area::-webkit-scrollbar { width: 6px; }
    .log-area::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
    input:focus { ring: 2px; outline: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useCallback, useEffect, useRef, createElement: h } = React;
    const _mc = window.metaContract || window.sensible || {};
    const { NftManager, FtManager, MetaletSigner, API_TARGET, mvc } = _mc;

    // ─── utils ─────────────────────────────────────────────

    function fmtAddr(addr) {
      if (!addr) return '';
      return addr.length > 20 ? addr.slice(0, 10) + '...' + addr.slice(-8) : addr;
    }

    function openExplorer(txid, net) {
      const base = net === 'mainnet' ? 'https://www.mvcscan.com/tx' : 'https://testnet.mvcscan.com/tx';
      window.open(`${base}/${txid}`, '_blank');
    }

    // ─── Hook: useMetalet ──────────────────────────────────
    function useMetalet() {
      const [state, setState] = useState({
        connected: false, address: '', publicKey: '', network: 'testnet', utxos: [], balance: 0,
      });

      const connect = useCallback(async () => {
        try {
          if (!window.metaidwallet) {
            if (location.protocol === 'file:') {
              throw new Error('浏览器禁止 file:// 协议下加载扩展，请使用本地服务器打开:\nnpx serve examples/metalet-demo\n或 python3 -m http.server 8080 -d examples/metalet-demo');
            }
            throw new Error('Metalet 钱包未安装，请先安装 Chrome 扩展');
          }
          const addrRes = await window.metaidwallet.connect();
          const address = typeof addrRes === 'string' ? addrRes : (addrRes?.address || '');
          if (!address) throw new Error('未能获取钱包地址');

          let pubKey = '';
          try {
            pubKey = await window.metaidwallet.getPublicKey();
          } catch (_) {
            // getPublicKey 可能不存在，不影响后续操作
          }

          // 判断网络：优先从 Metalet API 获取，fallback 按地址前缀
          let network = 'testnet';
          try {
            const netRes = await window.metaidwallet.getNetwork();
            if (netRes) {
              network = typeof netRes === 'string' ? netRes : (netRes.network || netRes);
            }
          } catch (_) {
            // getNetwork 不存在，按地址前缀判断
            network = /^[1]/.test(address) ? 'mainnet' : 'testnet';
          }

          let rawUtxos = [];
          try {
            rawUtxos = await window.metaidwallet.getUtxos();
          } catch (_) {
            // getUtxos 可能报错，使用空数组
          }
          const utxos = (Array.isArray(rawUtxos) ? rawUtxos : (rawUtxos?.utxo || rawUtxos?.data || []))
            .map(u => ({
              txId: u.txid, outputIndex: u.outIndex ?? 0,
              satoshis: Number(u.value ?? 0), address: u.address || address,
            }));
          const balance = utxos.reduce((s, u) => s + u.satoshis, 0);
          setState({ connected: true, address, publicKey: pubKey, network, utxos, balance });
          return { address, publicKey: pubKey, utxos };
        } catch (e) {
          throw e;
        }
      }, []);

      const disconnect = useCallback(() => {
        setState({ connected: false, address: '', publicKey: '', network: 'testnet', utxos: [], balance: 0 });
      }, []);

      return { ...state, connect, disconnect };
    }

    // ─── Hook: useSigner ───────────────────────────────────
    function useSigner() {
      const signerRef = useRef(null);
      const getSigner = useCallback(() => {
        if (!signerRef.current) {
          if (!window.metaidwallet) throw new Error('Metalet 未连接');
          signerRef.current = new MetaletSigner(window.metaidwallet);
        }
        return signerRef.current;
      }, []);
      return getSigner;
    }

    // ─── Component: WalletConnect ─────────────────────────
    function WalletConnect({ connected, onConnect, onDisconnect, loading }) {
      if (connected) {
        return h('button', {
          onClick: onDisconnect,
          className: 'px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 rounded-lg text-sm font-medium transition',
        }, '断开连接');
      }
      return h('button', {
        onClick: onConnect,
        disabled: loading,
        className: 'px-4 py-2 bg-blue-600 hover:bg-blue-700 disabled:bg-blue-400 text-white rounded-lg text-sm font-medium transition',
      }, loading ? '连接中...' : '连接 Metalet');
    }

    // ─── Component: WalletInfo ────────────────────────────
    function WalletInfo({ address, publicKey, balance, network }) {
      if (!address) return null;
      return h('div', { className: 'bg-gray-50 rounded-xl p-4 space-y-2 text-sm' },
        h('div', { className: 'flex justify-between' },
          h('span', { className: 'text-gray-500' }, '地址'),
          h('span', { className: 'font-mono text-gray-800' }, fmtAddr(address)),
        ),
        h('div', { className: 'flex justify-between' },
          h('span', { className: 'text-gray-500' }, '公钥'),
          h('span', { className: 'font-mono text-gray-800' }, fmtAddr(publicKey)),
        ),
        h('div', { className: 'flex justify-between' },
          h('span', { className: 'text-gray-500' }, 'SPACE 余额'),
          h('span', { className: 'font-mono text-gray-800' }, (balance / 1e8).toFixed(8)),
        ),
        h('div', { className: 'flex justify-between' },
          h('span', { className: 'text-gray-500' }, '网络'),
          h('span', {
            className: 'font-mono px-2 py-0.5 rounded text-xs ' + (network === 'mainnet' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'),
          }, network),
        ),
      );
    }

    // ─── Component: UtxoPanel ─────────────────────────────
    function UtxoPanel({ utxos }) {
      if (!utxos || utxos.length === 0) return null;
      return h('div', { className: 'space-y-2' },
        h('h3', { className: 'text-sm font-semibold text-gray-700' }, `SPACE UTXO (${utxos.length} 个)`),
        h('div', { className: 'max-h-40 overflow-y-auto space-y-1' },
          utxos.map((u, i) =>
            h('div', { key: i, className: 'flex justify-between text-xs font-mono bg-gray-50 px-3 py-1.5 rounded' },
              h('span', { className: 'text-gray-600' }, `${fmtAddr(u.txId)}:${u.outputIndex}`),
              h('span', { className: 'text-gray-800 font-medium' }, `${(u.satoshis / 1e8).toFixed(8)} SPACE`),
            )
          ),
        ),
      );
    }

    // ─── Component: StatusLog ─────────────────────────────
    function StatusLog({ logs }) {
      const ref = useRef(null);
      useEffect(() => { if (ref.current) ref.current.scrollTop = ref.current.scrollHeight; }, [logs]);

      return h('div', { className: 'space-y-2' },
        h('div', { className: 'flex justify-between items-center' },
          h('h3', { className: 'text-sm font-semibold text-gray-700' }, '操作日志'),
          logs.length > 0 && h('button', {
            onClick: () => logs.splice(0, logs.length),
            className: 'text-xs text-gray-400 hover:text-gray-600',
          }, '清空'),
        ),
        h('div', { ref, className: 'log-area bg-gray-900 text-green-400 rounded-xl p-3 font-mono text-xs space-y-1' },
          logs.length === 0
            ? h('div', { className: 'text-gray-500 italic' }, '暂无日志，连接 Metalet 后进行操作...')
            : logs.map((log, i) =>
                h('div', { key: i },
                  h('span', { className: 'text-gray-500' }, log.time),
                  ' ',
                  h('span', { className: log.type === 'error' ? 'text-red-400' : log.type === 'success' ? 'text-green-300' : 'text-gray-300' }, log.msg),
                )
              ),
        ),
      );
    }

    // ─── Component: FtTransfer ────────────────────────────
    function FtTransfer({ utxos, network, signer, onResult, onLog }) {
      const [form, setForm] = useState({ codehash: '', genesis: '', receiver: '', amount: '', ftTxId: '', ftOutIdx: '0', ftTokenAddr: '', ftTokenAmt: '' });
      const [busy, setBusy] = useState(false);

      const set = (k) => (e) => setForm(f => ({ ...f, [k]: e.target.value }));

      const handleTransfer = useCallback(async () => {
        setBusy(true);
        try {
          onLog('info', '构建 FT 转账交易...');
          const signerInstance = signer();

          const ft = new FtManager({
            network, apiTarget: API_TARGET.APIMVC, signer: signerInstance, feeb: 1,
          });

          const ftUtxos = [{
            txId: form.ftTxId, outputIndex: Number(form.ftOutIdx),
            tokenAddress: form.ftTokenAddr, tokenAmount: form.ftTokenAmt,
          }];

          onLog('info', `转账 ${form.amount} FT → ${fmtAddr(form.receiver)}`);

          const result = await ft.transfer({
            codehash: form.codehash, genesis: form.genesis,
            receivers: [{ address: form.receiver, amount: form.amount }],
            ftUtxos, ftChangeAddress: form.ftTokenAddr,
            utxos, changeAddress: utxos[0]?.address || form.ftTokenAddr,
          });

          onLog('success', `FT 转账成功！txid: ${result.txid}`);
          onResult({
            txid: result.txid, txHex: result.txHex,
            routeCheckTxHex: result.routeCheckTxHex, type: 'FT 转账',
          });
        } catch (e) {
          onLog('error', `FT 转账失败: ${e.message}`);
        } finally {
          setBusy(false);
        }
      }, [form, utxos, network, signer, onResult, onLog]);

      const Input = (label, val, onChange, opts) =>
        h('div', { className: 'space-y-1' },
          h('label', { className: 'text-xs text-gray-500 font-medium' }, label),
          h('input', { value: val, onChange, className: 'w-full px-3 py-1.5 border border-gray-200 rounded-lg text-sm focus:border-blue-400', ...opts }),
        );

      return h('div', { className: 'space-y-3' },
        h('div', { className: 'grid grid-cols-2 gap-3' },
          Input('CodeHash', form.codehash, set('codehash')),
          Input('Genesis', form.genesis, set('genesis')),
        ),
        h('div', { className: 'border-t border-gray-100 pt-3' },
          h('p', { className: 'text-xs text-gray-400 mb-2 font-medium' }, '接收方'),
        ),
        h('div', { className: 'grid grid-cols-2 gap-3' },
          Input('接收地址', form.receiver, set('receiver')),
          Input('金额 (raw)', form.amount, set('amount')),
        ),
        h('div', { className: 'border-t border-gray-100 pt-3' },
          h('p', { className: 'text-xs text-gray-400 mb-2 font-medium' }, 'FT UTXO'),
        ),
        h('div', { className: 'grid grid-cols-2 gap-3' },
          Input('FT txId', form.ftTxId, set('ftTxId')),
          Input('输出索引', form.ftOutIdx, set('ftOutIdx'), { type: 'number' }),
        ),
        h('div', { className: 'grid grid-cols-2 gap-3' },
          Input('Token 地址', form.ftTokenAddr, set('ftTokenAddr')),
          Input('Token 金额', form.ftTokenAmt, set('ftTokenAmt')),
        ),
        h('button', {
          onClick: handleTransfer, disabled: busy || utxos.length === 0,
          className: 'w-full py-2.5 bg-purple-600 hover:bg-purple-700 disabled:bg-purple-400 text-white rounded-lg text-sm font-medium transition',
        }, busy ? '签名中...（请在 Metalet 中确认）' : '执行 FT 转账'),
      );
    }

    // ─── Component: NftTransfer ───────────────────────────
    function NftTransfer({ utxos, network, signer, onResult, onLog }) {
      const [form, setForm] = useState({ codehash: '', genesis: '', tokenIndex: '0', receiver: '' });
      const [busy, setBusy] = useState(false);

      const set = (k) => (e) => setForm(f => ({ ...f, [k]: e.target.value }));

      const handleTransfer = useCallback(async () => {
        setBusy(true);
        try {
          onLog('info', '构建 NFT 转账交易...');
          const signerInstance = signer();

          const nft = new NftManager({
            network, apiTarget: API_TARGET.APIMVC, signer: signerInstance, feeb: 1,
          });

          onLog('info', `转移 Token#${form.tokenIndex} → ${fmtAddr(form.receiver)}`);

          const result = await nft.transfer({
            codehash: form.codehash, genesis: form.genesis,
            tokenIndex: form.tokenIndex, receiverAddress: form.receiver,
            utxos,
          });

          onLog('success', `NFT 转账成功！txid: ${result.txid}`);
          onResult({ txid: result.txid, txHex: result.txHex, type: 'NFT 转账' });
        } catch (e) {
          onLog('error', `NFT 转账失败: ${e.message}`);
        } finally {
          setBusy(false);
        }
      }, [form, utxos, network, signer, onResult, onLog]);

      const Input = (label, val, onChange, opts) =>
        h('div', { className: 'space-y-1' },
          h('label', { className: 'text-xs text-gray-500 font-medium' }, label),
          h('input', { value: val, onChange, className: 'w-full px-3 py-1.5 border border-gray-200 rounded-lg text-sm focus:border-blue-400', ...opts }),
        );

      return h('div', { className: 'space-y-3' },
        h('div', { className: 'grid grid-cols-2 gap-3' },
          Input('CodeHash', form.codehash, set('codehash')),
          Input('Genesis', form.genesis, set('genesis')),
        ),
        h('div', { className: 'grid grid-cols-2 gap-3' },
          Input('Token Index', form.tokenIndex, set('tokenIndex')),
          Input('接收地址', form.receiver, set('receiver')),
        ),
        h('button', {
          onClick: handleTransfer, disabled: busy || utxos.length === 0,
          className: 'w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-400 text-white rounded-lg text-sm font-medium transition',
        }, busy ? '签名中...（请在 Metalet 中确认）' : '执行 NFT 转账'),
      );
    }

    // ─── Component: TxResult ──────────────────────────────
    function TxResult({ result, network, onLog }) {
      if (!result) return null;
      return h('div', { className: 'bg-green-50 border border-green-200 rounded-xl p-4 space-y-2' },
        h('div', { className: 'flex items-center gap-2' },
          h('span', { className: 'text-green-600 font-semibold text-sm' }, '✅ 交易成功'),
          h('span', { className: 'text-xs text-gray-400' }, `(${result.type})`),
        ),
        h('div', { className: 'flex items-center gap-2' },
          h('code', { className: 'text-xs font-mono bg-white px-2 py-1 rounded border' }, result.txid),
          h('button', {
            onClick: () => { navigator.clipboard.writeText(result.txid); onLog('info', 'txid 已复制'); },
            className: 'text-xs text-blue-500 hover:text-blue-700',
          }, '复制'),
          h('button', {
            onClick: () => openExplorer(result.txid, network),
            className: 'text-xs text-blue-500 hover:text-blue-700',
          }, '浏览器查看'),
        ),
        result.txHex && h('details', {},
          h('summary', { className: 'text-xs text-gray-500 cursor-pointer hover:text-gray-700' }, '查看原始 txHex'),
          h('textarea', {
            readOnly: true, rows: 3,
            className: 'w-full mt-1 text-xs font-mono bg-white border rounded p-2',
            value: result.txHex,
          }),
        ),
      );
    }

    // ─── Component: StatusBadge ───────────────────────────
    function StatusBadge({ connected }) {
      return h('span', {
        className: 'inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium ' +
          (connected ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'),
      },
        h('span', {
          className: 'w-2 h-2 rounded-full ' + (connected ? 'bg-green-500' : 'bg-gray-400'),
        }),
        connected ? '已连接' : '未连接',
      );
    }

    // ─── Component: TabSwitcher ───────────────────────────
    function TabSwitcher({ tabs, active, onChange }) {
      return h('div', { className: 'flex border-b border-gray-200 mb-4' },
        tabs.map(t =>
          h('button', {
            key: t.key, onClick: () => onChange(t.key),
            className: 'px-4 py-2 text-sm font-medium transition border-b-2 -mb-px ' +
              (active === t.key ? 'border-blue-500 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700'),
          }, t.label)
        ),
      );
    }

    // ─── Card wrapper ─────────────────────────────────────
    function Card({ title, children }) {
      return h('div', { className: 'bg-white border border-gray-200 rounded-2xl p-5 shadow-sm space-y-4' },
        title && h('h2', { className: 'text-base font-semibold text-gray-800' }, title),
        children,
      );
    }

    // ─── App ──────────────────────────────────────────────
    function App() {
      const wallet = useMetalet();
      const getSigner = useSigner();
      const [connectLoading, setConnectLoading] = useState(false);
      const [activeTab, setActiveTab] = useState('nft');
      const [txResult, setTxResult] = useState(null);
      const [logs, setLogs] = useState([]);

      const addLog = useCallback((type, msg) => {
        const now = new Date();
        const time = now.toLocaleTimeString('zh-CN', { hour12: false });
        setLogs(prev => [...prev, { time, type, msg }]);
      }, []);

      const handleConnect = useCallback(async () => {
        setConnectLoading(true);
        try {
          await wallet.connect();
          addLog('success', `Metalet 已连接: ${fmtAddr(wallet.address)}`);
        } catch (e) {
          addLog('error', `连接失败: ${e.message}`);
        } finally {
          setConnectLoading(false);
        }
      }, [wallet, addLog]);

      const handleResult = useCallback((r) => {
        setTxResult(r);
      }, []);

      const tabs = [
        { key: 'nft', label: 'NFT 转账' },
        { key: 'ft', label: 'FT 转账' },
      ];

      return h('div', { className: 'min-h-screen bg-gradient-to-br from-slate-50 to-blue-50' },
        h('div', { className: 'max-w-2xl mx-auto px-4 py-8 space-y-6' },
          // Header
          h('div', { className: 'flex items-center justify-between' },
            h('div',
              h('h1', { className: 'text-xl font-bold text-gray-900' }, 'Meta-Contract Metalet Demo'),
              h('p', { className: 'text-sm text-gray-500 mt-0.5' }, '使用 Metalet 钱包签名 NFT / FT 转账'),
            ),
            h('div', { className: 'flex items-center gap-3' },
              h(StatusBadge, { connected: wallet.connected }),
              h(WalletConnect, {
                connected: wallet.connected,
                onConnect: handleConnect,
                onDisconnect: () => { wallet.disconnect(); setTxResult(null); addLog('info', '已断开 Metalet'); },
                loading: connectLoading,
              }),
            ),
          ),

          // Wallet Info
          wallet.connected && h(Card, { title: '钱包信息' },
            h(WalletInfo, { address: wallet.address, publicKey: wallet.publicKey, balance: wallet.balance, network: wallet.network }),
            wallet.utxos.length > 0 && h(UtxoPanel, { utxos: wallet.utxos }),
          ),

          // Transfer Panel
          wallet.connected && h(Card, { title: '转账操作' },
            h(TabSwitcher, { tabs, active: activeTab, onChange: setActiveTab }),
            activeTab === 'nft'
              ? h(NftTransfer, { utxos: wallet.utxos, network: wallet.network, signer: getSigner, onResult: handleResult, onLog: addLog })
              : h(FtTransfer, { utxos: wallet.utxos, network: wallet.network, signer: getSigner, onResult: handleResult, onLog: addLog }),
          ),

          // Tx Result
          txResult && h(Card, null,
            h(TxResult, { result: txResult, network: wallet.network, onLog: addLog }),
          ),

          // Logs
          h(Card, { title: null },
            h(StatusLog, { logs }),
          ),

          // Footer
          h('p', { className: 'text-center text-xs text-gray-400' },
            '需要安装 ',
            h('a', { href: 'https://metalet.space', className: 'text-blue-500 hover:underline', target: '_blank' }, 'Metalet 钱包'),
            ' 扩展程序',
          ),
        ),
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(h(App));
  </script>
</body>
</html>
